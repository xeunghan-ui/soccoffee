<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>싸커피</title>
<meta name="description" content="싸커피 — 카페 풋살 리그">
<meta name="robots" content="noindex">
<!-- 홈 화면 추가 아이콘(SCF 로고) -->
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="scf-icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15281b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="싸커피">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #15281b;
    --card: #1e3526;
    --coffee: #ece6d2;
    --coffee-2: #d6cfb4;
    --accent: #ddd6b6;
    --accent-soft: #26402f;
    --green: #46b381;
    --green-soft: #1f3a2b;
    --red: #dc5238;
    --text: #ece6d2;
    --muted: #a4b39a;
    --line: #33492f;
    --radius: 12px;
    --shadow: none;
    --navh: calc(62px + env(safe-area-inset-bottom));   /* 하단 네비 높이 — 모든 하단 오버레이가 이 위로 */
    /* === 디자인 캐논 v0.1 — 에너지 액센트(레트로 골드) + 의미 색 === */
    --gold: #ddd6b6; --gold-bright: #ece6d2; --gold-dim: #4a6450; --gold-bg: rgba(221,214,182,.07);
    --win: #5a9277; --win-bg: rgba(90,146,119,.13);
    --alert: #bd6452; --alert-bg: rgba(189,100,82,.12);
    --disp: "Anton", "Pretendard", sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard", "Pretendard Variable", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 80px; }

  header { text-align: center; padding: 26px 16px 18px; }
  .brand-logo { width: 156px; max-width: 56%; height: auto; display: block; margin: 0 auto 10px; }
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 19px; font-weight: 800; color: var(--coffee); letter-spacing: -0.5px;
  }
  .logo .cup { font-size: 26px; }
  .tagline { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

  .tabs {
    display: flex; gap: 6px; background: #efe6d9;
    padding: 5px; border-radius: 14px; margin: 18px 0 20px;
  }
  .tab {
    flex: 1; text-align: center; padding: 11px 8px; border: none;
    background: transparent; border-radius: 10px; font-size: 15px;
    font-weight: 600; color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .tab.active { background: var(--card); color: var(--coffee); box-shadow: var(--shadow); }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px;
  }
  .card h2 { margin: 0 0 4px; font-size: 18px; color: var(--coffee); }
  .card .sub { margin: 0 0 18px; color: var(--muted); font-size: 13px; }

  label { display: block; font-size: 13px; font-weight: 600; margin: 0 0 6px; color: var(--coffee-2); }
  .field { margin-bottom: 16px; }
  input, select, textarea {
    width: 100%; min-width: 0; padding: 12px 13px; border: 1.5px solid var(--line);
    border-radius: 11px; font-size: 15px; font-family: inherit;
    background: #fdfbf8; color: var(--text); transition: border .15s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; min-width: 0; }

  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: var(--coffee); color: #fff; font-size: 16px; font-weight: 800;
    cursor: pointer; transition: background .15s; font-family: inherit;
  }
  .btn:hover { background: #3a2719; }
  .btn:active { transform: translateY(1px); }
  .btn.accent { background: var(--accent); }
  .btn.accent:hover { background: #ad7320; }
  .btn.ghost { background: transparent; color: var(--muted); font-weight: 600; padding: 10px; }
  .btn.sm { width: auto; padding: 7px 14px; font-size: 13px; border-radius: 9px; }
  .btn:disabled { background: #cdbfae; cursor: not-allowed; }

  .section-title { font-family: 'WildGag', inherit; font-size: 18px; font-weight: 800; color: var(--coffee); margin: 4px 4px 12px;
    display: flex; justify-content: space-between; align-items: center; }
  .refresh { background: none; border: none; color: var(--accent); font-size: 13px; font-weight: 600;
    cursor: pointer; padding: 4px 8px; }
  #rideList { display: grid; grid-template-columns: 1fr; gap: 10px; align-items: start; }
  #rideList .empty { grid-column: 1 / -1; }
  @media (min-width: 768px) { #rideList { grid-template-columns: repeat(2, 1fr); } }
  .ride {
    background: var(--card); border-radius: 13px; box-shadow: var(--shadow);
    padding: 13px 15px; margin-bottom: 0; border: 1.5px solid transparent; min-width: 0;
  }
  .ride.full { opacity: .72; }
  .ride-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .driver { font-size: 15px; font-weight: 800; color: var(--coffee); display: flex; align-items: center; gap: 6px; min-width: 0; word-break: keep-all; }
  .driver .ico { width: 25px; height: 25px; border-radius: 50%; background: var(--accent-soft);
    display: inline-flex; align-items: center; justify-content: center; font-size: 14px; }
  .seats-badge {
    flex-shrink: 0; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 800;
    background: var(--green-soft); color: var(--green); white-space: nowrap;
  }
  .seats-badge.full { background: #f4e0dc; color: var(--red); }
  .seats-badge.done { background: #ece5db; color: var(--muted); }
  .ride-meta { margin: 8px 0 0; display: grid; gap: 3px; }
  .meta-line { font-size: 13px; color: var(--text); line-height: 1.5; word-break: keep-all; overflow-wrap: anywhere; }
  .meta-line .sep { color: var(--muted); margin: 0 2px; }
  .meta-line .dest-part { white-space: nowrap; }
  .meta-place {
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; min-height: 2.9em;
  }

  .riders { margin: 10px 0 0; padding-top: 10px; border-top: 1px dashed var(--line); }
  .riders-toggle {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    background: none; border: none; padding: 0; cursor: pointer; font-family: inherit;
    font-size: 12px; font-weight: 800; color: var(--muted); letter-spacing: .3px;
  }
  .riders-toggle .chev { transition: transform .18s; font-size: 13px; }
  .riders-toggle .chev.open { transform: rotate(180deg); }
  .riders-body { display: none; margin-top: 9px; }
  .riders-body.open { display: block; }
  .rider-chip {
    display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft);
    color: var(--coffee); padding: 4px 10px; border-radius: 20px; font-size: 12px;
    font-weight: 600; margin: 0 5px 5px 0;
  }
  .rider-chip .treat { color: var(--accent); font-weight: 600; }
  .chip-x {
    margin-left: 1px; border: none; background: rgba(75,52,36,.12); color: var(--coffee);
    width: 16px; height: 16px; border-radius: 50%; font-size: 9px; line-height: 1;
    padding: 0; cursor: pointer; flex-shrink: 0;
  }
  .chip-x:hover { background: var(--red); color: #fff; }
  .chip-x:disabled { opacity: .35; cursor: not-allowed; }
  .apply-note { font-size: 12px; color: var(--muted); margin: 0 0 10px; line-height: 1.45; }
  .apply-note b { color: var(--coffee-2); }
  .empty-riders { font-size: 12px; color: var(--muted); }
  .ride-actions { margin-top: 11px; display: flex; gap: 8px; align-items: center; }
  .ride.past { opacity: .72; }
  .past-hint { font-size: 12px; color: var(--muted); }

  .past-toggle {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    background: none; border: none; cursor: pointer; font-family: inherit;
    padding: 18px 2px 6px; font-size: 14px; font-weight: 800; color: var(--coffee-2);
  }
  .past-toggle .chev { transition: transform .18s; }
  .past-toggle .chev.open { transform: rotate(180deg); }
  #pastCount { color: var(--muted); font-weight: 600; font-size: 12px; }
  .past-list { display: none; }
  .past-list.open { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 768px) { .past-list.open { grid-template-columns: repeat(2, 1fr); } }

  .apply-panel { margin-top: 14px; padding: 16px; background: #fbf6ee; border-radius: 12px; display: none; }
  .apply-panel.open { display: block; }
  .manage-panel { margin-top: 12px; padding: 12px 14px; background: #faf3ec; border-radius: 12px;
    display: none; align-items: center; justify-content: space-between; gap: 10px; }
  .manage-panel.open { display: flex; }
  .manage-label { font-size: 12px; color: var(--muted); }

  .admin-bar { text-align: center; margin-top: 28px; }
  .admin-link {
    background: none; border: none; color: var(--muted); font-size: 12px;
    cursor: pointer; padding: 6px 10px; border-radius: 8px; font-family: inherit;
  }
  .admin-link:hover { color: var(--coffee-2); }
  .admin-link.on { color: var(--red); font-weight: 600; }
  .treat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 6px; }
  .treat-opt {
    padding: 8px 13px; border: 1.5px solid var(--line); border-radius: 20px; background: #fff;
    font-size: 13px; cursor: pointer; font-weight: 600; color: var(--coffee-2); transition: all .12s;
  }
  .treat-opt.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .big { font-size: 40px; margin-bottom: 10px; }

  .toast {
    position: fixed; left: 50%; bottom: calc(var(--navh) + 18px); transform: translateX(-50%) translateY(20px);
    background: var(--coffee); color: #fff; padding: 13px 22px; border-radius: 30px;
    font-size: 14px; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,.2);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .closed-note {
    background: var(--accent-soft); color: var(--coffee-2); font-size: 12px;
    padding: 9px 14px; border-radius: 10px; text-align: center; margin-bottom: 12px;
  }
  .demo-note {
    background: #fbecdf; color: #9c5a1f; font-size: 12px;
    padding: 9px 14px; border-radius: 10px; text-align: center; margin-bottom: 18px;
  }
  .hidden { display: none !important; }

  /* Password gate */
  .gate {
    position: fixed; inset: 0; background: var(--bg); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .gate-box {
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 32px 26px; width: 100%; max-width: 360px; text-align: center;
  }
  .gate-box .cup { font-size: 44px; }
  .gate-box h1 { font-size: 20px; color: var(--coffee); margin: 10px 0 4px; }
  .gate-box p { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
  .gate-box input { text-align: center; font-size: 16px; letter-spacing: 1px; padding-right: 44px; }
  .pw-wrap { position: relative; }
  .pw-toggle {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 18px;
    padding: 6px 8px; opacity: .55; line-height: 1;
  }
  .pw-toggle:hover { opacity: 1; }
  .pw-toggle.on { opacity: 1; }
  .gate-err { color: var(--red); font-size: 13px; font-weight: 600; margin: 10px 0 0; min-height: 18px; }

  /* ===== POTM 이달의 선수 투표 ===== */
  .potm-hero {
    background: linear-gradient(135deg, #4b3424, #6f4e37);
    color: #fff; border-radius: var(--radius); padding: 22px 20px; text-align: center; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .potm-hero .trophy { font-size: 38px; line-height: 1; }
  .potm-hero h2 { margin: 8px 0 2px; font-size: 20px; color: #fff; }
  .potm-hero .month { font-size: 13px; color: var(--accent-soft); font-weight: 600; }
  .potm-hero .turnout { margin-top: 12px; font-size: 12px; color: #f3e3c8; }
  .potm-hero .turnout b { color: #fff; font-size: 14px; }

  .voter-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: #fbf6ee; border: 1.5px solid var(--line); border-radius: 12px; padding: 11px 14px; margin-bottom: 14px;
  }
  .voter-bar .who { font-size: 13px; color: var(--coffee-2); min-width: 0; }
  .voter-bar .who b { color: var(--coffee); }

  .potm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; }
  @media (min-width: 480px) { .potm-grid { grid-template-columns: repeat(3, 1fr); } }
  .cand {
    border: 1.5px solid var(--line); background: var(--card); border-radius: 13px;
    padding: 13px 8px; text-align: center; cursor: pointer; transition: all .12s; user-select: none;
  }
  .cand:hover { border-color: var(--accent); }
  .cand.sel { border-color: var(--accent); background: var(--accent-soft); box-shadow: var(--shadow); }
  .cand .av {
    width: 42px; height: 42px; margin: 0 auto 7px; border-radius: 50%; background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; color: var(--coffee);
  }
  .cand.sel .av { background: var(--accent); color: #fff; }
  .cand .nm { font-size: 14px; font-weight: 600; color: var(--coffee); }
  .cand .tr { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .vote-cta { position: sticky; bottom: 12px; margin-top: 16px; }
  .potm-note { font-size: 12px; color: var(--muted); text-align: center; margin: 12px 4px 0; line-height: 1.5; }

  /* 결과 */
  .res-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .res-rank { width: 24px; text-align: center; font-size: 15px; font-weight: 800; color: var(--muted); flex-shrink: 0; }
  .res-rank.top { color: var(--accent); }
  .res-main { flex: 1; min-width: 0; }
  .res-name { font-size: 14px; font-weight: 600; color: var(--coffee); display: flex; justify-content: space-between; }
  .res-name .cnt { color: var(--accent); font-weight: 800; }
  .res-bar { height: 8px; background: #efe6d9; border-radius: 5px; overflow: hidden; margin-top: 4px; }
  .res-bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), #ad7320); border-radius: 5px; transition: width .4s; }
  .res-locked { text-align: center; padding: 30px 18px; color: var(--muted); }
  .res-locked .big { font-size: 34px; margin-bottom: 8px; }

  /* ===== 탭바 가로 스크롤 (탭이 늘어나도 안 깨지게) ===== */
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 0 0 auto; white-space: nowrap; padding: 11px 14px; }
  .tab.ops { color: var(--red); }
  .tab.ops.active { color: var(--red); }

  /* ===== 공지 / 홈 ===== */
  .session-card {
    background: linear-gradient(135deg, #2f7a4f, #245f3e); color: #fff;
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .session-card .lbl { font-size: 12px; font-weight: 600; color: #cdeBD8; color: #d6efe0; letter-spacing: .4px; }
  .session-card .when { font-size: 22px; font-weight: 800; margin: 4px 0 2px; }
  .session-card .where { font-size: 14px; color: #e6f4ec; }
  .session-card .att-mini { margin-top: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px 13px; font-size: 13px; color: #eafbf1; }
  .session-card .att-mini b { font-size: 16px; color: #fff; }
  .session-card.none { background: #ece5db; color: var(--muted); }
  .session-card.none .when { color: var(--coffee-2); }

  .notice {
    background: var(--card); border-radius: 12px; box-shadow: var(--shadow);
    padding: 12px 14px; margin-bottom: 8px; border-left: 4px solid var(--line);
  }
  .notice.pinned { border-left-color: var(--accent); background: #fffaf1; }
  .notice .n-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .notice.has-body .n-top { cursor: pointer; }
  .notice.has-body .n-top::after { content: '▾'; font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .notice.open.has-body .n-top::after { content: '▴'; }
  .notice.has-link { cursor: pointer; }
  .notice.has-link .n-top::after { content: '→'; font-size: 14px; color: var(--accent); flex-shrink: 0; }
  .notice .n-title { font-size: 15px; font-weight: 400; color: var(--coffee); word-break: keep-all; flex: 1; min-width: 0; }
  .notice .n-date { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .notice .n-body { display: none; font-size: 14px; color: var(--text); margin-top: 8px; white-space: pre-wrap; word-break: break-word; }
  .notice.open .n-body { display: block; }
  .notice .pin-tag { font-size: 10px; background: var(--accent); color: #fff; border-radius: 5px; padding: 1px 5px; margin-right: 5px; vertical-align: middle; }
  .notice .n-actions { margin-top: 10px; display: flex; gap: 8px; }

  .link-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 4px 0 8px; }
  .link-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px; text-decoration: none;
    background: var(--card); border: 1.5px solid var(--line); border-radius: 13px;
    padding: 16px 10px; color: var(--coffee); font-weight: 800; font-size: 14px; box-shadow: var(--shadow);
    transition: border .12s;
  }
  .link-btn:hover { border-color: var(--accent); }
  .link-btn .ico { font-size: 24px; }
  .link-btn .sub { font-size: 11px; color: var(--muted); font-weight: 600; }

  /* ===== 참석 ===== */
  .att-seg { display: flex; gap: 8px; margin: 4px 0 2px; }
  .att-seg button {
    flex: 1; padding: 13px 8px; border: 1.5px solid var(--line); background: #fff; border-radius: 12px;
    font-size: 15px; font-weight: 800; color: var(--coffee-2); cursor: pointer; font-family: inherit; transition: all .12s;
  }
  .att-seg button.yes.on { background: var(--green); border-color: var(--green); color: #fff; }
  .att-seg button.no.on { background: var(--red); border-color: var(--red); color: #fff; }
  .att-seg button.maybe.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .att-counts { display: flex; gap: 10px; margin: 12px 0; }
  .att-cnt { flex: 1; text-align: center; background: #fbf6ee; border-radius: 12px; padding: 12px 6px; }
  .att-cnt .num { font-size: 26px; font-weight: 400; font-family: var(--disp); letter-spacing: .01em; }
  .att-cnt .cap { font-size: 12px; color: var(--muted); font-weight: 600; }
  .att-cnt.yes .num { color: var(--green); }
  .att-cnt.no .num { color: var(--red); }
  .att-cnt.maybe .num { color: var(--accent); }
  .att-cnt.none .num { color: var(--muted); }
  .att-list { margin-top: 8px; }
  .att-row { display: flex; align-items: center; gap: 8px; padding: 8px 4px; border-bottom: 1px solid var(--line); font-size: 14px; }
  .att-row:last-child { border-bottom: none; }
  .att-row .js { width: 30px; color: var(--muted); font-weight: 600; font-size: 12px; text-align: center; flex-shrink: 0; }
  .att-row .nm { flex: 1; color: var(--coffee); font-weight: 600; }
  .att-row .st { font-size: 12px; font-weight: 800; padding: 3px 9px; border-radius: 20px; }
  .att-row button.st { border: none; cursor: pointer; font-family: inherit; }
  .att-row .st.yes { background: var(--green-soft); color: var(--green); }
  .att-row .st.no { background: #f4e0dc; color: var(--red); }
  .att-row .st.maybe { background: var(--accent-soft); color: #9c5a1f; }
  .att-row .st.none { background: #efe6d9; color: var(--muted); }
  /* 운영진 출석: 참석/미정/불참 직접 선택 (비활성 흐리게, 선택만 진하게) */
  .st-set { display: flex; gap: 5px; flex-shrink: 0; }
  .att-row .st-set .st { padding: 4px 9px; opacity: .35; }
  .att-row .st-set .st.on { opacity: 1; }
  /* 운영진 일괄 수정: 저장 바 + 변경(미저장) 표시 */
  .save-bar { position: fixed; left: 12px; right: 12px; bottom: calc(var(--navh) + 8px); max-width: 456px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px 10px; background: var(--green, #2f5a3f); color: var(--sand, #ddd6b6); border-radius: 12px; padding: 13px 16px; box-shadow: 0 8px 28px rgba(0,0,0,.4); z-index: 250; }
  .save-bar .save-n { font-size: 13px; font-weight: 800; flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .save-bar .sb-actions { display: flex; gap: 8px; flex: 0 0 auto; }
  .save-bar button { font-family: inherit; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 800; cursor: pointer; font-size: 13px; }
  .save-bar .ok { background: #ddd6b6; color: #14281b; }
  .save-bar .cancel { background: transparent; color: #ece6d2; border: 1px solid rgba(255,255,255,.45); }
  .dirty-dot { color: var(--accent); font-size: 9px; vertical-align: middle; }
  .att-row.dirty, .dues-row.dirty { background: rgba(212,160,60,.10); border-radius: 8px; }

  /* ===== 회비 ===== */
  .dues-summary { display: flex; gap: 10px; margin-bottom: 14px; }
  .dues-stat { flex: 1; text-align: center; background: #fbf6ee; border: 1.5px solid var(--line); border-radius: 12px; padding: 13px 6px; }
  .dues-stat .num { font-size: 26px; font-weight: 400; font-family: var(--disp); letter-spacing: .01em; color: var(--coffee); }
  .dues-stat .cap { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 2px; }
  .dues-stat.paid .num { color: var(--green); }
  .dues-stat.unpaid .num { color: var(--red); }
  .dues-progress { height: 9px; background: #efe6d9; border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .dues-progress > div { height: 100%; background: linear-gradient(90deg, var(--green), #245f3e); transition: width .4s; }
  .dues-row { display: flex; align-items: center; gap: 8px; padding: 9px 4px; border-bottom: 1px solid var(--line); }
  .dues-row:last-child { border-bottom: none; }
  .dues-row.me { background: #fffaf1; border-radius: 8px; }
  .dues-row .nm { flex: 1; font-size: 14px; font-weight: 600; color: var(--coffee); }
  .dues-row .amt { font-size: 12px; color: var(--muted); }
  .dues-badge { font-size: 12px; font-weight: 800; padding: 4px 11px; border-radius: 20px; border: none; cursor: default; font-family: inherit; }
  .dues-badge.paid { background: var(--green-soft); color: var(--green); }
  .dues-badge.unpaid { background: #f4e0dc; color: var(--red); }
  .dues-badge.dormant { background: #6b6b6b; color: #f0ede2; }
  .dues-badge.toggle { cursor: pointer; }
  .dues-badge.toggle:hover { filter: brightness(.96); }
  /* 회비 운영진: 납부/미납/휴면 직접 선택(참석 방식) */
  .dues-row .st-set .st { font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 20px; border: none; cursor: pointer; font-family: inherit; opacity: .4; }
  .dues-row .st-set .st.on { opacity: 1; }
  .dues-row .st.paid { background: var(--win-bg); color: var(--win); }
  .dues-row .st.unpaid { background: var(--alert-bg); color: var(--alert); }
  .dues-row .st.dormant { background: #3a4a3e; color: #c3cbb6; }
  /* 회비 탭 명단: 2열 그리드 (좁은 화면은 1열) */
  .dues-grid { display: grid; grid-template-columns: 1fr; column-gap: 18px; }

  /* ===== 운영진 ===== */
  .ops-note { background: #f4e0dc; color: #8a2f22; font-size: 12px; padding: 9px 14px; border-radius: 10px; text-align: center; margin-bottom: 14px; font-weight: 600; }
  .ops-sec { margin-bottom: 10px; }
  .ops-sec > summary {
    cursor: pointer; list-style: none; padding: 14px 16px; background: var(--card); border-radius: 13px;
    box-shadow: var(--shadow); font-size: 15px; font-weight: 800; color: var(--coffee);
    display: flex; justify-content: space-between; align-items: center;
  }
  .ops-sec > summary::-webkit-details-marker { display: none; }
  .ops-sec[open] > summary { border-radius: 13px 13px 0 0; }
  .ops-sec .ops-body { background: var(--card); border-radius: 0 0 13px 13px; box-shadow: var(--shadow); padding: 4px 16px 16px; margin-top: -2px; }
  .ops-sec .cnt-tag { font-size: 12px; color: var(--muted); font-weight: 600; }

  /* =====================================================================
     딥 그린 테마 — 배경 #15281B(올리브그린), 글씨/포인트 크림·샌드(#DDD6B6)
     밝은 샌드 블록을 포커스로 / 상태는 채움(샌드) vs 외곽선
     ===================================================================== */
  body {
    background:
      linear-gradient(rgba(12,24,16,0.74), rgba(12,24,16,0.86)),
      url("scf_bg.png") center center / cover fixed no-repeat;
    background-color: #15281b;
    color: #ece6d2;
  }
  .wrap { max-width: 480px; }
  header { padding: 28px 16px 6px; }
  .brand-logo { width: 132px; }

  /* 하단 로고 */
  .site-footer { text-align: center; padding: 34px 0 14px; }
  .footer-logo { width: 70px; height: auto; opacity: .9; }

  /* 폰트는 전부 Pretendard (타이틀은 squad 규칙의 굵은 weight 사용) */
  .logo { letter-spacing: -0.6px; font-weight: 800; color: #ece6d2; }
  .tagline { letter-spacing: .2px; color: #95a083; }

  /* 입력 — 밝은 크림 위 그린 텍스트 */
  input, select, textarea { background: #ece6d2; color: #14281b; border: 1.5px solid #c4b894; }
  input::placeholder, textarea::placeholder { color: #8a8468; }
  label { color: #d6cfb4; }
  .hint, .empty, .empty-riders, .apply-note, .past-hint { color: #95a083; }

  /* 탭 */
  .tabs { background: #102016; border-radius: 12px; gap: 4px;
    position: sticky; top: 8px; z-index: 50; box-shadow: 0 8px 20px rgba(0,0,0,.32); }
  .tabs::before { content: ''; position: absolute; left: -16px; right: -16px; top: -12px; bottom: -10px;
    background: #15281b; z-index: -1; }
  .tab { font-weight: 800; letter-spacing: -0.2px; color: #8c9a7c; border-radius: 9px; }
  .tab.active { background: var(--gold); color: #23180a; box-shadow: none; }
  .tab.ops { color: #6f8068; }
  .tab.ops.active { background: var(--gold); color: #23180a; }

  /* 카드 — 떠 있는 그린 패널 */
  .card { background: var(--card); border: 1px solid var(--line); box-shadow: none; border-radius: var(--radius); }
  .card h2 { color: #f1ecd8; font-weight: 800; letter-spacing: -0.3px; }
  .card .sub { color: #95a083; }

  /* 섹션 제목 — 상단 샌드 룰 */
  .section-title { font-family: inherit; color: #ece6d2; font-weight: 800;
    letter-spacing: .04em; border-top: 1px solid var(--line); padding-top: 14px;
    text-transform: uppercase; font-size: 15px; }
  .refresh { color: var(--gold); font-weight: 800; }

  /* 버튼 — 샌드 채움 + 딥그린 텍스트 */
  .btn { background: var(--accent); color: #14281b; border-radius: 10px; letter-spacing: -0.2px; }
  .btn:hover { background: #cfc7a2; }
  .btn.accent { background: var(--accent); color: #14281b; }
  .btn.accent:hover { background: #cfc7a2; }
  .btn.ghost { color: #ece6d2; border: 1px solid #4a6450; background: transparent; }
  .btn:disabled { background: #4a6450; color: #97a085; }

  /* 히어로(다음 세션 / MVP / 회비) = 밝은 샌드 포커스 블록 */
  .potm-hero, .session-card { background: #ddd6b6 !important; color: #14281b; box-shadow: none; border-radius: var(--radius); }
  .potm-hero h2, .session-card .when { color: #14281b; }
  .session-card .lbl { color: #5e6e4d; text-transform: uppercase; letter-spacing: 1px; }
  .session-card .when { letter-spacing: -0.5px; }
  .session-card .where, .session-card .att-mini { color: #3a4a32; }
  .session-card .att-mini a { color: #14281b !important; }
  .session-card .att-mini b, .potm-hero .turnout b { color: #14281b; }
  .potm-hero .month { color: #5e6e4d; }
  .potm-hero .turnout { color: #3a4a32; }
  .session-card.none { background: #1e3526 !important; color: #ece6d2; }
  .session-card.none .when { color: #ece6d2; }
  .potm-hero .trophy { display: none; }

  /* 막대 그래프 */
  .res-bar, .dues-progress { background: #2a3d30; }
  .res-bar > div { background: var(--gold); }
  .dues-progress > div { background: var(--win); }
  .res-rank, .res-name, .res-name .cnt { color: #ece6d2; }
  .res-rank.top { color: var(--gold-bright); }

  /* 상태 배지 — 채움(긍정=샌드) / 외곽선(부정) / 짙은패널(중립) */
  .seats-badge { background: var(--win); color: #07120c; }
  .seats-badge.full { background: var(--alert-bg); color: var(--alert); border: 1px solid rgba(220,82,56,.4); }
  .seats-badge.done { background: #2a3d30; color: #97a085; }

  .att-seg button { border-radius: 10px; background: #1e3526; border-color: #3a523f; color: #ece6d2; }
  .att-seg button.yes.on { background: var(--win); border-color: var(--win); color: var(--cream); }
  .att-seg button.no.on { background: var(--alert); border-color: var(--alert); color: var(--cream); }
  .att-seg button.maybe.on { background: var(--gold); border-color: var(--gold); color: #23180a; }
  .att-cnt { background: #1e3526; }
  .att-cnt .cap { color: #95a083; }
  .att-cnt.yes .num { color: var(--win); }
  .att-cnt.no .num { color: var(--alert); }
  .att-cnt.maybe .num { color: var(--gold-bright); }
  .att-cnt.none .num { color: #95a083; }
  .att-row { border-color: #2a3d30; }
  .att-row .nm { color: #ece6d2; }
  .att-row .js { color: #8c9a7c; }
  .att-row .st.yes { background: var(--win-bg); color: var(--win); }
  .att-row .st.no { background: var(--alert-bg); color: var(--alert); }
  .att-row .st.maybe { background: var(--gold-bg); color: var(--gold-bright); }
  .att-row .st.none { background: #2a3d30; color: #7a8a6c; }

  /* 회비 */
  .dues-stat { background: #1e3526; }
  .dues-stat .num { color: #ece6d2; }
  .dues-stat.paid .num { color: var(--win); }
  .dues-stat.unpaid .num { color: var(--alert); }
  .dues-stat .cap { color: #95a083; }
  .dues-row { border-color: #2a3d30; }
  .dues-row .nm { color: #ece6d2; }
  .dues-row .amt { color: #95a083; }
  .dues-badge.paid { background: var(--win-bg); color: var(--win); }
  .dues-badge.unpaid { background: var(--alert-bg); color: var(--alert); border: 1px solid rgba(220,82,56,.4); }
  .dues-row.me { background: #24402e; }

  /* 공지 */
  .notice { background: #1e3526; border-left-color: #3a523f; }
  .notice .n-title { color: #f1ecd8; }
  .notice .n-body { color: #d6cfb4; }
  .notice .n-date { color: #8c9a7c; }
  .notice.pinned { background: #24402e; border-left-color: var(--gold); }
  .notice .pin-tag { background: var(--gold); color: #23180a; }

  /* 바로가기 / 칩 / 폼 패널 / 기타 */
  .link-btn { background: #1e3526; color: #ece6d2; }
  .link-btn .sub { color: #95a083; }
  .link-btn:hover { border-color: var(--gold); }
  .ops-note { background: #24402e; color: #ece6d2; }
  .apply-panel { background: #18301f; }
  .manage-panel { background: #18301f; }
  .manage-label { color: #95a083; }
  .gate {
    background:
      linear-gradient(rgba(12,24,16,0.78), rgba(12,24,16,0.9)),
      url("scf_bg.png") center center / cover fixed no-repeat;
    background-color: #15281b;
  }
  .gate-box { background: #1e3526; border: 1px solid #33492f; box-shadow: none; }
  .gate-box h1 { color: #f1ecd8; }
  .gate-box p { color: #95a083; }
  .pw-toggle { display: none; }
  .gate-box input { padding-right: 13px; }
  .demo-note { background: #24402e; color: #d6cfb4; }
  .closed-note { background: #24402e; color: #b9c2a4; }
  .admin-link { color: #8c9a7c; }
  .admin-link.on { color: var(--gold); }
  .admin-bar { display: flex; gap: 8px; justify-content: center; align-items: center; flex-wrap: wrap; }
  .me-label { font-size: 12px; color: #95a083; font-weight: 600; }
  .driver, .meta-line, .riders-toggle, .past-toggle { color: #ece6d2; }
  .cand { background: #1e3526; border-color: #33492f; }
  .cand .nm { color: #ece6d2; }
  .cand .tr { color: #95a083; }
  .cand:hover { border-color: var(--accent); }
  .cand.sel { background: var(--accent); border-color: var(--accent); box-shadow: none; }
  .cand.sel .nm { color: #14281b; }
  .cand.sel .tr { color: #3a4a32; }
  .cand .av { background: #2a3d30; color: #ece6d2; }
  .cand.sel .av { background: #14281b; color: var(--accent); }
  input:focus, select:focus, textarea:focus { border-color: #14281b; }
  .rider-chip { background: #2a3d30; color: #ece6d2; }
  .rider-chip .treat { color: var(--gold); }
  .treat-opt { background: #1e3526; color: #d6cfb4; border-color: #3a523f; }
  .treat-opt.selected { background: var(--accent); border-color: var(--accent); color: #14281b; }
  .voter-bar { background: #1e3526; border-color: #33492f; }
  .voter-bar .who, .voter-bar .who b { color: #ece6d2; }
  .toast { background: #ddd6b6; color: #14281b; border-radius: 8px; }

  /* 세션 캐러셀(좌우 슬라이드) + 도트/카운터 */
  .sess-carousel { display: flex; gap: 10px; overflow-x: auto; scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch; scrollbar-width: none; margin-bottom: 10px; }
  .sess-carousel::-webkit-scrollbar { display: none; }
  .sess-carousel .session-card { flex: 0 0 100%; scroll-snap-align: center; margin-bottom: 0; }
  .sess-dots { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }
  .sess-dots #sessDots { display: inline-flex; gap: 6px; align-items: center; }
  .sess-count { font-size: 12px; font-weight: 800; color: #b9c2a4; }
  .sdot { width: 7px; height: 7px; border-radius: 50%; background: #4a6450; transition: all .2s; }
  .sdot.on { background: var(--gold); width: 20px; border-radius: 4px; }

  /* 운영진 내부 서브탭 */
  .ops-subtabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
  .ops-subtabs::-webkit-scrollbar { display: none; }
  .ops-subtab { flex: 1 0 auto; padding: 9px 14px; border-radius: 9px; border: 1px solid var(--line);
    background: #1e3526; color: #ece6d2; font-weight: 800; font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .ops-subtab.on { background: var(--accent); color: #14281b; border-color: var(--accent); }

  /* 모바일 운영진 화면 최적화 */
  @media (max-width: 460px){
    #opsContent .row { flex-direction: column; gap: 0; }
    .ops-subtabs { gap: 5px; }
    .ops-subtab { padding: 8px 10px; font-size: 12px; }
    #opsContent .dues-row { gap: 6px; }
    #opsContent .dues-row .nm { flex: 1 1 100%; }
    #opsContent .dues-row .btn.sm { padding: 6px 11px; font-size: 12px; }
    #opsContent .dues-badge { font-size: 11px; padding: 3px 9px; }
    .vote-cat { font-size: 13px; padding: 10px 6px; }
    .rk-tab { padding: 8px 11px; font-size: 12px; }
  }

  /* 참석 팀별 그룹 헤더 */
  .att-grp-h { display: flex; justify-content: space-between; align-items: center;
    font-weight: 800; color: #ece6d2; font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
    margin: 14px 0 4px; padding-top: 9px; border-top: 1px solid var(--line); cursor: pointer; }
  .att-grp:first-child .att-grp-h { border-top: none; padding-top: 0; margin-top: 0; }
  .att-grp-h span { font-size: 12px; font-weight: 600; color: #95a083; letter-spacing: 0; text-transform: none; }
  .att-grp-h .grp-caret { margin-left: auto; padding-left: 10px; }
  .att-grp-h .grp-caret::before { content: '▾'; font-size: 11px; }
  .att-grp.collapsed .att-grp-h .grp-caret::before { content: '▸'; }
  .att-grp.collapsed .att-grp-body { display: none; }

  /* 랭킹 */
  .rk-tabs { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
  .rk-tabs::-webkit-scrollbar { display: none; }
  .rk-tab { flex: 1 0 auto; padding: 9px 13px; border-radius: 9px; border: 1px solid var(--line);
    background: #1e3526; color: #ece6d2; font-weight: 800; font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .rk-tab.on { background: var(--accent); color: #14281b; border-color: var(--accent); }
  .rk-years { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .rk-year { padding: 5px 11px; border-radius: 20px; border: 1px solid var(--line); background: transparent;
    color: #95a083; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .rk-year.on { background: var(--accent); color: #14281b; border-color: var(--accent); }
  .rk-note { font-size: 12px; color: #95a083; margin-bottom: 12px; }
  .rk-podium { display: grid; gap: 8px; margin-bottom: 16px; }
  .rk-card { background: #1e3526; border: 1px solid var(--line); border-top: 3px solid var(--gold); border-radius: 12px; padding: 13px 10px; text-align: center; }
  .rk-card .rkrank { font-size: 18px; font-weight: 800; font-family: var(--disp); color: var(--gold-bright); }
  .rk-card .rknm { font-size: 13px; font-weight: 800; color: #ece6d2; margin: 3px 0; }
  .rk-card .rkval { font-size: 22px; font-weight: 400; font-family: var(--disp); color: var(--gold-bright); }
  .rk-card .rksub { font-size: 10px; color: #95a083; margin-top: 2px; }
  .rk-row { display: flex; flex-direction: column; gap: 5px; padding: 10px 12px; background: #1e3526;
    border: 1px solid var(--line); border-radius: 10px; margin-bottom: 6px; }
  .rk-main { display: flex; align-items: center; gap: 10px; }
  .rk-row .rkr { font-size: 12px; font-weight: 800; color: #95a083; min-width: 26px; text-align: center; }
  .rk-row .rkn { flex: 1; font-size: 14px; font-weight: 600; color: #ece6d2; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rk-row .rkbar { flex: 1.2; height: 6px; background: #2a3d30; border-radius: 4px; overflow: hidden; }
  .rk-row .rkbar > div { height: 100%; background: var(--gold); }
  .rk-row .rkv { font-size: 15px; font-weight: 800; color: var(--gold-bright); min-width: 50px; text-align: right; white-space: nowrap; }
  .rk-sub { font-size: 11px; color: #95a083; padding-left: 36px; }

  /* 투표 부문 탭 */
  .vote-cats { display: flex; gap: 8px; margin-bottom: 14px; }
  .vote-cat { flex: 1; padding: 11px 8px; border-radius: 10px; border: 1px solid var(--line);
    background: #1e3526; color: #ece6d2; font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit; }
  .vote-cat.on { background: var(--accent); color: #14281b; border-color: var(--accent); }

  /* 세션 선택 칩 / 운영 행 */
  .member-subnav { display: flex; gap: 6px; margin: 2px 0 16px; background: #16291c; border: 1px solid var(--line); border-radius: 12px; padding: 4px; }

/* ---------- 데이터 계층 (DB 또는 로컬) ---------- */
async function fetchRides() {
  if (USE_DB) {
    const { data, error } = await sb.from('rides').select('*').order('created_at', { ascending: false });
    if (error) { toast('불러오기 오류: ' + error.message); return []; }
    return data.map(r => ({
      id: r.id, driver: r.driver, place: r.place, date: r.ride_date,
      time: r.ride_time, seats: r.seats, dest: r.dest, riders: r.riders || []
    }));
  }
  try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch (e) { return []; }
}

async function insertRide(r) {
  if (USE_DB) {
    const { data, error } = await sb.from('rides').insert({
      driver: r.driver, place: r.place, ride_date: r.date, ride_time: r.time,
      seats: r.seats, dest: r.dest, riders: []
    }).select('id').single();
    if (error) { toast('등록 오류: ' + error.message); return null; }
    return data.id;
  }
  const local = await fetchRides();
  const id = Date.now();
  local.unshift({ ...r, id, riders: [] });
  localStorage.setItem(STORE, JSON.stringify(local));
  return id;
}

/* ---------- 내가 신청한 좌석 (이 브라우저 기준) + 취소 규칙 ---------- */
const APPS_KEY = 'socoffee_my_apps';
function getMyApps() { try { return JSON.parse(localStorage.getItem(APPS_KEY)) || []; } catch (e) { return []; } }
function addMyApp(rid) { const a = getMyApps(); a.push(rid); localStorage.setItem(APPS_KEY, JSON.stringify(a)); }
function removeMyApp(rid) { localStorage.setItem(APPS_KEY, JSON.stringify(getMyApps().filter(x => x !== rid))); }

function departureMs(r) { return new Date(r.date + 'T' + (r.time || '00:00')).getTime(); }
function cancelable(r) { return Date.now() < departureMs(r) - 30 * 60 * 1000; }  // 출발 30분 전까지

// rid가 있으면 rid로, 없으면 순서(index)로 탑승자 제거
function dropRider(riders, index, target) {
  if (target && target.rid) return riders.filter(x => x.rid !== target.rid);
  return riders.filter((_, i) => i !== index);
}
async function removeRiderByIndex(rideId, index, target) {
  if (USE_DB) {
    const { data, error } = await sb.from('rides').select('riders').eq('id', rideId).single();
    if (error) { toast('오류: ' + error.message); return false; }
    const riders = dropRider(data.riders || [], index, target);
    const { error: e2 } = await sb.from('rides').update({ riders }).eq('id', rideId);
    if (e2) { toast('처리 오류: ' + e2.message); return false; }
    return true;
  }
  const local = await fetchRides();
  const r = local.find(x => x.id === rideId);
  if (!r) return false;
  r.riders = dropRider(r.riders, index, target);
  localStorage.setItem(STORE, JSON.stringify(local));
  return true;
}

// 좌석을 다시 확인하고 탑승자를 추가 (초과 예약 방지)
async function addRider(id, rider) {
  if (USE_DB) {
    const { data, error } = await sb.from('rides').select('seats, riders').eq('id', id).single();
    if (error) { toast('오류: ' + error.message); return false; }
    const riders = data.riders || [];
    if (riders.length >= data.seats) return 'full';
    riders.push(rider);
    const { error: e2 } = await sb.from('rides').update({ riders }).eq('id', id);
    if (e2) { toast('신청 오류: ' + e2.message); return false; }
    return true;
  }
  const local = await fetchRides();
  const r = local.find(x => x.id === id);
  if (!r) return false;
  if (r.riders.length >= r.seats) return 'full';
  r.riders.push(rider);
  localStorage.setItem(STORE, JSON.stringify(local));
  return true;
}

async function deleteRide(id) {
  if (USE_DB) {
    const { error } = await sb.from('rides').delete().eq('id', id);
    if (error) { toast('삭제 오류: ' + error.message); return false; }
    return true;
  }
  const local = (await fetchRides()).filter(r => r.id !== id);
  localStorage.setItem(STORE, JSON.stringify(local));
  return true;
}

const ALL_TABS = ['home','att','dues','list','potm','rank','more','mine','faq','squad','ops'];
function switchTab(tab, mode) {
  if (tab === 'ops' && !isAdmin()) tab = 'home';   // 운영진 전용 탭은 비운영진 직접 접근 차단
  const memberTabs = ['squad','list','potm','rank'];   // 멤버 탭 묶음(멤버현황·카풀·투표·랭킹)
  const navActive = memberTabs.includes(tab) ? 'member' : (['home','att'].includes(tab) ? tab : 'more');
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === navActive));
  ALL_TABS.forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.classList.toggle('hidden', t !== tab);
  });
  // 멤버 서브탭 바 표시/활성
  const msub = document.getElementById('memberSubnav');
  if (msub) {
    msub.classList.toggle('hidden', !memberTabs.includes(tab));
    msub.querySelectorAll('.msub').forEach(b => b.classList.toggle('on', b.dataset.sub === tab));
  }
  // 히스토리: 기본은 pushState(탭마다 항목 → 뒤로가기로 탭 이동). 'replace'=초기/대체, 'none'=뒤로가기 처리 중(조작 안 함)
  if (mode !== 'none' && location.hash.slice(1) !== tab) {
    try {
      if (mode === 'replace') history.replaceState(null, '', '#' + tab);
      else history.pushState(null, '', '#' + tab);
    } catch(e){ location.hash = tab; }
  }
  // 탭 전환 시 맨 위로 (하단에서 다른 탭으로 이동해도 빈 화면처럼 보이지 않게)
  if (mode !== 'none') { try { window.scrollTo(0, 0); document.scrollingElement.scrollTop = 0; } catch(e){} }
  if (tab === 'home') renderHome();
  if (tab === 'att')  renderAtt();
  if (tab === 'dues') renderDues();
  if (tab === 'list') render();
  if (tab === 'potm') renderPotm();
  if (tab === 'rank') renderRank();
  if (tab === 'ops')  renderOps();
  if (tab === 'more') renderMore();
  if (tab === 'mine') renderMine();
  if (tab === 'faq')  renderFaq();
  if (tab === 'squad') renderSquad();
}

// 기본값: 다음 수요일(오늘이 수요일이면 오늘), 오후 8시
function setDefaults() {
  const now = new Date();
  let diff = (3 - now.getDay() + 7) % 7;            // 3 = 수요일
  if (diff === 0 && now.getHours() >= 21) diff = 7;  // 오늘 수요일이고 밤이면 다음 주
  const wed = new Date(now); wed.setDate(now.getDate() + diff);
  const yyyy = wed.getFullYear(), mm = String(wed.getMonth() + 1).padStart(2, '0'), dd = String(wed.getDate()).padStart(2, '0');
  const dateEl = document.getElementById('f-date'), timeEl = document.getElementById('f-time');
  if (!dateEl.value) dateEl.value = `${yyyy}-${mm}-${dd}`;
  if (!timeEl.value) timeEl.value = '20:00';
}
setDefaults();

function fmtDate(d, t) {
  if (!d) return '';
  const dt = new Date(d + 'T' + (t || '00:00'));
  const days = ['일','월','화','수','목','금','토'];
  const m = dt.getMonth() + 1, day = dt.getDate(), wd = days[dt.getDay()];
  let hh = dt.getHours(), mm = String(dt.getMinutes()).padStart(2, '0');
  const ampm = hh < 12 ? '오전' : '오후';
  let h12 = hh % 12; if (h12 === 0) h12 = 12;
  return `${m}/${day}(${wd}) ${ampm} ${h12}:${mm}`;
}

function rideCard(r, past) {
  const taken = r.riders.length, left = r.seats - taken, full = left <= 0;
  // 제작자 판별: 로그인 이름(=driver) 일치 or 등록한 기기(isMine). 운영진은 관리 권한으로 삭제 가능.
  const _meNm = (typeof meName==='function') ? (meName()||'') : '';
  const isCreator = isMine(r.id) || (!!_meNm && !!r.driver && _meNm.trim() === String(r.driver).trim());
  const owner = isCreator || isAdmin();
  const ridersHtml = taken === 0
    ? `<div class="empty-riders">${past ? '신청자가 없었어요.' : '아직 신청자가 없어요. 첫 탑승자가 되어보세요!'}</div>`
    : r.riders.map((rd, i) => {
        if (past) return `<span class="rider-chip">${esc(rd.name)}${rd.treat ? ` · <span class="treat">${esc(rd.treat)}</span>` : ''}</span>`;
        const own = !!(rd.rid && isMyApp(rd.rid));
        const canShow = own || isAdmin();
        const canX = isAdmin() || (own && cancelable(r));
        const x = canShow ? `<button class="chip-x" onclick="cancelSeat('${r.id}',${i},${own})" title="${canX ? (isAdmin() && !own ? '탑승자 빼기' : '탑승 취소') : '출발 30분 전이라 취소 불가'}" ${canX ? '' : 'disabled'}>✕</button>` : '';
        return `<span class="rider-chip">${esc(rd.name)}${rd.treat ? ` · <span class="treat">${esc(rd.treat)}</span>` : ''}${x}</span>`;
      }).join('');

  const actions = past
    ? `${owner ? `<button class="btn accent sm" onclick="repostRide('${r.id}')">다시 올리기</button>` : `<span class="past-hint">지난 카풀이에요</span>`}
       ${owner ? `<button class="btn ghost sm" onclick="toggleManage('${r.id}')" title="관리"></button>` : ''}`
    : `${full ? `<button class="btn sm" disabled>좌석 마감</button>`
              : `<button class="btn accent sm" onclick="toggleApply('${r.id}')">탑승 신청</button>`}
       ${owner ? `<button class="btn ghost sm" onclick="toggleManage('${r.id}')" title="관리"></button>` : ''}`;

  return `
    <div class="ride ${(full && !past) ? 'full' : ''} ${past ? 'past' : ''}">
      <div class="ride-top">
        <div class="driver">${esc(r.driver)} 님</div>
        <div class="seats-badge ${past ? 'done' : (full ? 'full' : '')}">${past ? '종료' : (full ? '마감' : `잔여 ${left}석`)}</div>
      </div>
      <div class="ride-meta">
        <div class="meta-line meta-place">${esc(r.place)}${r.dest ? ` <span class="dest-part"><span class="sep">→</span> ${esc(r.dest)}</span>` : ''}</div>
        <div class="meta-line">${fmtDate(r.date, r.time)} <span class="sep">·</span> ${taken}/${r.seats}명</div>
      </div>
      <div class="riders">
        <button class="riders-toggle" onclick="toggleRiders('${r.id}')">
          <span>탑승자 ${taken}명</span><span class="chev" id="chev-${r.id}">▾</span>
        </button>
        <div class="riders-body" id="riders-${r.id}">${ridersHtml}</div>
      </div>
      <div class="ride-actions">${actions}</div>
      ${owner ? `<div class="manage-panel" id="manage-${r.id}">
        <span class="manage-label">${isCreator ? '내가 등록한 카풀이에요' : '관리자 권한으로 삭제'}</span>
        <button class="btn ghost sm" onclick="removeRide('${r.id}')" style="color:var(--red)">삭제하기</button>
      </div>` : ''}
      ${past ? '' : `<div class="apply-panel" id="apply-${r.id}">
        <p class="apply-note" style="margin-bottom:10px"><b>${esc(meName())}</b> 님으로 신청해요.</p>
        <div class="field">
          <label>답례 <span style="color:var(--muted);font-weight:400">(선택 — 안 골라도 신청 가능)</span></label>
          <div class="treat-chips" id="tc-${r.id}">
            ${TREATS.map(t => `<span class="treat-opt" onclick="pickTreat('${r.id}', this, '${t}')">${t}</span>`).join('')}
          </div>
          <input class="hidden" id="tcustom-${r.id}" placeholder="직접 입력 (예: 아이스아메리카노 살게요)" maxlength="30" style="margin-top:8px">
        </div>
        <p class="apply-note">신청 후 <b>출발 30분 전까지</b> 직접 취소할 수 있어요. (탑승자 목록에서 내 이름 옆 ✕)</p>
        <button class="btn accent sm" onclick="applyRide('${r.id}')">신청 완료</button>
      </div>`}
    </div>`;
}

async function render() {
  const list = document.getElementById('rideList');
  const pastSection = document.getElementById('pastSection');
  const pastList = document.getElementById('pastList');
  list.innerHTML = `<div class="empty">불러오는 중...</div>`;
  const rides = await fetchRides();
  const _lt = document.getElementById('tab-list');
  if (_lt && !_lt.classList.contains('hidden')) markRidesSeen(rides);  // 카풀 탭이 실제로 열려 있을 때만 신규 점 해제
  else refreshNewBadges();
  const now = Date.now();
  // 지난 카풀은 '전월 1일' 이후만 표시(그 이전은 자동 숨김). 데이터는 지우지 않음.
  const _nd = new Date();
  const _cut = `${new Date(_nd.getFullYear(), _nd.getMonth()-1, 1).getFullYear()}-${String(new Date(_nd.getFullYear(), _nd.getMonth()-1, 1).getMonth()+1).padStart(2,'0')}-01`;
  const active = rides.filter(r => departureMs(r) >= now);
  const past = rides.filter(r => departureMs(r) < now && (r.date||'') >= _cut).sort((a, b) => departureMs(b) - departureMs(a));

  list.innerHTML = active.length === 0
    ? `<div class="empty"><div class="big"></div><div>진행 중인 카풀이 없어요.<br>새 카풀을 등록해 보세요!</div></div>`
    : active.map(r => rideCard(r, false)).join('');

  if (past.length === 0) {
    pastSection.classList.add('hidden');
    pastList.innerHTML = '';
  } else {
    pastSection.classList.remove('hidden');
    document.getElementById('pastCount').textContent = `${past.length}건`;
    pastList.innerHTML = past.map(r => rideCard(r, true)).join('');
  }
}

// 같은 요일·시간 그대로, 다음 주(미래)로 날짜만 이동
function nextWeekDate(origDateStr) {
  const d = new Date((origDateStr || '') + 'T00:00');
  if (isNaN(d.getTime())) return origDateStr;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  while (d <= today) d.setDate(d.getDate() + 7);
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

async function repostRide(id) {
  const rides = await fetchRides();
  const r = rides.find(x => String(x.id) === String(id));
  if (!r) return;
  const newDate = nextWeekDate(r.date);
  const newId = await insertRide({ driver: r.driver, place: r.place, date: newDate, time: r.time, seats: r.seats, dest: r.dest });
  if (!newId) return;
  addMyRide(newId);
  await rerender(render);
  toast(`다시 올렸어요 — ${fmtDate(newDate, r.time)} `);
}

async function applyRide(id) {
  const name = meName();
  if (!name) return toast('로그인이 필요해요');
  // 1인 1신청: 아직 출발 안 한 카풀 중 이미 내 이름으로 신청된 게 있으면 차단(같은 카풀 중복 포함)
  if (!isAdmin()) {
    const _rides = await fetchRides();
    const _dup = _rides.find(x => departureMs(x) > Date.now() && (x.riders||[]).some(rd => (rd.name||'').trim() === name.trim()));
    if (_dup) { toast(`이미 '${_dup.driver} 님' 카풀에 신청돼 있어요. 바꾸려면 먼저 취소해 주세요.`); return; }
  }
  let treat = treatPick[id] || '';
  if (treat === '__custom__') treat = document.getElementById('tcustom-' + id).value.trim();

  const rid = Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const res = await addRider(idCast(id), { name, treat, rid });
  if (res === 'full') { await render(); return toast('아쉽게도 좌석이 마감됐어요'); }
  if (!res) return;
  addMyApp(rid);
  delete treatPick[id];
  await rerender(render);
  toast('탑승 신청 완료! ');
}

async function cancelSeat(rideId, index, own) {
  const admin = isAdmin();
  const rides = await fetchRides();
  const r = rides.find(x => String(x.id) === String(rideId));
  if (!r) return;
  if (!admin && !(own && cancelable(r))) return toast('출발 30분 전부터는 취소할 수 없어요');
  const target = r.riders[index];
  const msg = admin && !own ? `'${target ? target.name : ''}' 님을 탑승에서 뺄까요?` : '탑승을 취소할까요?';
  if (!confirm(msg)) return;
  const ok = await removeRiderByIndex(idCast(rideId), index, target);
  if (!ok) return;
  if (target && target.rid) removeMyApp(target.rid);
  await rerender(render);
  toast(admin && !own ? '탑승자를 뺐어요' : '탑승을 취소했어요');
}

async function removeRide(id) {
  if (!confirm('이 카풀을 삭제할까요?')) return;
  const ok = await deleteRide(idCast(id));
  if (!ok) return;
  await rerender(render);
  toast('삭제했어요');
}

/* ---------- 명단(players) — 운영진 탭에서 편집, Supabase(club_settings.roster)에 저장 ----------
   ROSTER / TEAM_SHEET 는 players 배열에서 파생됩니다.
   저장된 명단이 없으면 위 SEED로 시작하고, 운영진이 편집하면 그게 source of truth가 됩니다. */
function seedPlayers() {
  return ROSTER_SEED.map(r => {
    const t = TEAM_SHEET_SEED[r.name] || {};
    return { id:r.id, name:r.name, tier:r.tier, status:r.status||'active',
      joinDate:r.joinDate||'', friendsSince:r.friendsSince||null,
      dormantMonths:(r.dormantMonths||[]).slice(),
      jersey:(t.jersey!=null?t.jersey:null), eng:t.eng||'', team:t.team||'기타', cap:!!t.cap };
  });
}
let PLAYERS = seedPlayers();
let ROSTER = [];
let TEAM_SHEET = {};
function applyPlayers(players) {
  PLAYERS = players;
  ROSTER = players.map(p => {
    const o = { id:p.id, name:p.name, tier:p.tier, status:p.status||'active',
      joinDate:p.joinDate||'', dormantMonths:(p.dormantMonths||[]).slice(), activeMonths:(p.activeMonths||[]).slice() };
    if (p.friendsSince) o.friendsSince = p.friendsSince;
    return o;
  });
  TEAM_SHEET = {};
  players.forEach(p => {
    TEAM_SHEET[p.name] = { jersey:(p.jersey!=null?p.jersey:null), eng:p.eng||'', team:p.team||'기타', cap:!!p.cap };
  });
}
applyPlayers(PLAYERS);   // 초기엔 SEED 기준 (시작 시 Supabase 명단으로 덮어씀)

// 팀빌더에만 있는 멤버를 사이트 명단에 병합 → 로그인·참석·회비 가능
async function mergeTbMembers() {
  let tb = null;
  try { tb = await fetchTeamBuilder(); } catch(e) {}
  if (!tb || !Array.isArray(tb.players)) return;
  // 팀빌더를 명단 단일 출처로: 등번호·티어·상태·휴면을 팀빌더 기준으로 구성(전 멤버 동기화)
  const seen = new Set();
  const players = [];
  tb.players.forEach(tp => {
    if ((tp.status||'active') === 'former') return;   // 탈퇴 제외
    if (seen.has(tp.name)) return;                     // 중복 이름 방지
    seen.add(tp.name);
    const t = TEAM_SHEET[tp.name] || {};               // 팀(WHITE/BLACK)은 사이트 배정 유지
    players.push({ id:tp.id, name:tp.name, tier:tp.tier, status:tp.status||'active',
      joinDate:tp.joinDate||'', friendsSince:tp.friendsSince||null,
      dormantMonths:(tp.dormantMonths||[]).slice(), activeMonths:(tp.activeMonths||[]).slice(),
      jersey:(tp.jersey!=null?tp.jersey:null), eng:tp.engName||'',
      team:t.team||'기타', cap:!!t.cap });
  });
  if (players.length) applyPlayers(players);
}

function potmMonth() {

function potmMonthLabel(m) {

// 연간 운영 시즌: 팀 리그(3·5·9·11월) vs 일반(그 외 전부 — 혹서기·혹한기 포함). 팀 리그는 20–23시.
const LEAGUE_MONTHS = [3, 5, 9, 11];
function monthNumOf(dateOrMonth) {
  if (dateOrMonth == null) return new Date().getMonth() + 1;
  if (typeof dateOrMonth === 'number') return dateOrMonth;
  const s = String(dateOrMonth); const p = s.split('-');
  if (p.length >= 2) return parseInt(p[1], 10);
  const d = new Date(s); return isNaN(d) ? new Date().getMonth() + 1 : d.getMonth() + 1;
}
function isLeague(dateOrMonth) { return LEAGUE_MONTHS.includes(monthNumOf(dateOrMonth)); }
function seasonLabel(dateOrMonth) { return isLeague(dateOrMonth) ? '팀 리그' : '일반'; }
// 시즌별 기본 세션 시간: 팀 리그 20:00–23:00, 일반 21:00–23:00
function seasonDefaultTime(dateOrMonth) { return isLeague(dateOrMonth) ? { start:'20:00', end:'23:00' } : { start:'21:00', end:'23:00' }; }

function duesMonth() {
  const d = new Date();
  let y = d.getFullYear(), m = d.getMonth(); // 0-indexed
  if (d.getDate() >= 15) { m += 1; if (m > 11) { m = 0; y += 1; } }

  const pm = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;

    if(!tb || !Array.isArray(tb.sessions) || !tb.sessions.length) return null;
    const year = String(new Date().getFullYear());
    const sess = tb.sessions.filter(s=>(s.date||'').startsWith(year));
    if(!sess.length) return null;
    const players = (tb.players||[]).filter(p=>{ const st=p.status||'active'; return st!=='former'&&st!=='friends'; });
    const min = Math.ceil(sess.length*0.5);
    const vs = await getVoteStats(year);
    const voteRate = p => { if(!vs.voteMonths.length) return 1; const c=vs.voteMonths.filter(mo=>vs.voterByMonth[mo].has(p.id)).length; return c/vs.voteMonths.length; };
    const data = players.map(p=>{ const r=rkAtt(p,sess); if(r.counted<min) return null; const pm=new Set(sess.filter(s=>rkInPool(p,s.date)).map(s=>s.date.slice(0,7))); const dm=new Set((p.dormantMonths||[]).filter(mo=>pm.has(mo))); const dr=pm.size>0?Math.round(dm.size/pm.size*1000)/10:0; const poolS=sess.filter(s=>rkInPool(p,s.date)&&!rkDormant(p,s.date.slice(0,7))); const lmaCnt=poolS.filter(s=>(s.lastMinuteAbsentIds||[]).includes(p.id)).length; const lmaRate=poolS.length>0?Math.round(lmaCnt/poolS.length*1000)/10:0; const vr=voteRate(p); const win=vs.winsByMember[p.id]||0; const misV=Math.round((1-vr)*100); const s=Math.max(0,Math.round((r.rate - dr*0.3 - lmaRate*MODEL_LMA_PENALTY - misV*0.1 + win*MODEL_WIN_BONUS)*10)/10); return {id:p.id,_ar:r.rate,_s:s}; }).filter(Boolean).sort((a,b)=>b._s-a._s||b._ar-a._ar);
    if(!data.length) return null;
    const ranks = rkRanks(data, x=>String(x._s));
    const idx = data.findIndex(x=>x.id===memberId);
    if(idx<0) return null;
    return { rank: ranks[idx], total: data.length };
  }catch(e){ return null; }
}

// 전체 월 누적 MVP·성장 수상 횟수 (memberId -> 합계). 캐시.
let _winCounts = null;
async function getWinCounts(){
  if (_winCounts) return _winCounts;
  let rows = [];
  try {
    if (typeof USE_DB !== 'undefined' && USE_DB) { const { data } = await sb.from('potm_votes').select('month,category,candidate_id'); rows = data || []; }
    else { rows = JSON.parse(localStorage.getItem(POTM_STORE)) || []; }
  } catch(e) {}
  const top = (m,c) => { const t={}; rows.filter(v=>v.month===m&&v.category===c).forEach(v=>{ t[v.candidate_id]=(t[v.candidate_id]||0)+1; }); let b=null,bc=0; for(const k in t){ if(t[k]>bc){bc=t[k]; b=Number(k);} } return b; };
  const months = [...new Set(rows.map(v=>v.month))];
  const map = {};
  months.forEach(m => ['mvp','growth'].forEach(c => { const w = top(m,c); if (w!=null) map[w] = (map[w]||0)+1; }));
  _winCounts = map;
  return map;
}
const MODEL_WIN_BONUS = 2;    // 모범생: MVP·성장 수상 1회당 +점수(출석율 우선 위해 소폭)
const MODEL_LMA_PENALTY = 0.5; // 모범생: 당일불참율 1%당 −점수
// 투표 통계 (연도 접두어 필터): 투표 참여 월/투표자 + 월별 수상자 집계
async function getVoteStats(yearPrefix){
  let rows = [];
  try {
    if (typeof USE_DB !== 'undefined' && USE_DB) { const { data } = await sb.from('potm_votes').select('voter_id,candidate_id,month,category'); rows = data || []; }
    else { rows = JSON.parse(localStorage.getItem(POTM_STORE)) || []; }
  } catch(e) {}
  if (yearPrefix) rows = rows.filter(v => String(v.month||'').startsWith(yearPrefix));
  const voterByMonth = {}, byMC = {};
  rows.forEach(v => {
    (voterByMonth[v.month] = voterByMonth[v.month] || new Set()).add(v.voter_id);
    const key = v.month + '|' + (v.category||'mvp');
    (byMC[key] = byMC[key] || {}); byMC[key][v.candidate_id] = (byMC[key][v.candidate_id]||0) + 1;
  });
  const winsByMember = {};
  Object.keys(byMC).forEach(key => { const t=byMC[key]; let b=null,bc=0; for(const k in t){ if(t[k]>bc){bc=t[k]; b=Number(k);} } if(b!=null) winsByMember[b]=(winsByMember[b]||0)+1; });
  return { voteMonths: Object.keys(voterByMonth), voterByMonth, winsByMember };
}

// 해당 월 활동 회원 (team-builder 월별 현황과 동일 로직)
// 휴면은 팀빌더에서 읽어 반영 (이름 기준). 팀빌더에 없으면 사이트 명단의 값 사용
let TB_DORMANT = {};
let TB_ACTIVE = {};   // 월별 '활동' 예외(영구 휴면 회원이 특정 달만 활동으로 되돌림)
function dormantMonthsOf(p){
  const tb = TB_DORMANT[p.name];
  const seed = p.dormantMonths || [];
  if (tb === undefined) return seed;
  return Array.from(new Set([...(tb||[]), ...seed]));
}
// 활동 예외 월: 이 달에는 (영구 휴면이라도) 활동으로 간주 — 홈 토글로 멤버가 직접 지정
function activeMonthsOf(p){
  const tb = TB_ACTIVE[p.name];
  const seed = p.activeMonths || [];
  if (tb === undefined) return seed;
  return Array.from(new Set([...(tb||[]), ...seed]));
}
async function loadTbDormant(){
  try {
    const tb = await fetchTeamBuilder();
    const m = {}, am = {};
    if (tb && Array.isArray(tb.players)) tb.players.forEach(p => { m[p.name] = p.dormantMonths || []; am[p.name] = p.activeMonths || []; });
    TB_DORMANT = m; TB_ACTIVE = am;
  } catch(e) {}
}
// 이번(현재) 달 'YYYY-MM'
function nowMonthStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
// 휴면 판정(회비·출석 공용): ⓪ 활동 예외 월이면 활동 ① 영구 휴면(status:'dormant') ② 대상 월 휴면 ③ 이번 달 휴면.
// ③은 팀빌더가 보통 이번 달까지만 휴면을 갱신하므로, 대상 월이 다음 달일 때 기존 휴면 회원이 누락되지 않게 함.
function isDormantFor(p, monthStr){
  if (activeMonthsOf(p).includes(monthStr)) return false;   // 멤버가 이 달을 '활동'으로 지정
  if ((p.status||'active')==='dormant') return true;
  const dm = dormantMonthsOf(p);
  return dm.includes(monthStr) || dm.includes(nowMonthStr());
}

function activeMembers(monthStr) {
  const [yN, moN] = monthStr.split('-').map(Number);
  const monthEnd = new Date(yN, moN, 0);
  const relevant = ROSTER.filter(p => {
    const st = p.status || 'active';
    if (st === 'former') return false;
    if (st === 'friends') return p.friendsSince && monthStr < p.friendsSince;
    if (!p.joinDate) return false;
    return new Date(p.joinDate) <= monthEnd;
  });
  const TEAM_ORDER = { 'WHITE': 0, 'BLACK': 1, '기타': 2 };
  return relevant.filter(p => !dormantMonthsOf(p).includes(monthStr))
                 .map(p => {
                   const t = TEAM_SHEET[p.name] || { team: '기타' };
                   return { ...p, jersey: t.jersey, eng: t.eng || '', team: t.team, cap: !!t.cap };
                 })
                 .sort((a, b) => (TEAM_ORDER[a.team] - TEAM_ORDER[b.team]) ||
                                 ((a.jersey ?? 999) - (b.jersey ?? 999)) ||
                                 a.name.localeCompare(b.name, 'ko'));
}

// 투표 대상: 가입한 회원 중 해당 월 활동 회원. 탈퇴·싸커피 친구·해당 월 휴면 제외
function votingMembers(monthStr) {
  const [yN, moN] = monthStr.split('-').map(Number);
  const monthEnd = new Date(yN, moN, 0);
  const TEAM_ORDER = { 'WHITE': 0, 'BLACK': 1, '기타': 2 };
  return ROSTER.filter(p => {
      const st = p.status || 'active';
      if (st === 'former' || st === 'friends') return false;
      if (isDormantFor(p, monthStr)) return false;   // 휴면은 투표 불가(후보·투표자 모두 제외)
      return p.joinDate && new Date(p.joinDate) <= monthEnd;
    })
    .map(p => { const t = TEAM_SHEET[p.name] || { team: '기타' }; return { ...p, jersey: t.jersey, eng: t.eng || '', team: t.team, cap: !!t.cap }; })
    .sort((a, b) => (TEAM_ORDER[a.team] - TEAM_ORDER[b.team]) || ((a.jersey ?? 999) - (b.jersey ?? 999)) || a.name.localeCompare(b.name, 'ko'));
}

// 세션 참석 자격: 세션 속성 반영 — duesOnly(그 달 회비 납부자만) · allowDormant(휴면도 허용)
// reason: former | friends | notjoined | dormant | unpaid (month 포함) | none
async function sessAttEligible(sess, memberId){
  const meP = ROSTER.find(x => x.id === memberId);
  if (!meP) return { ok:false, reason:'none' };
  const st = meP.status || 'active';
  if (st === 'former') return { ok:false, reason:'former' };
  if (st === 'friends') return { ok:false, reason:'friends' };
  const sm = ((sess && sess.date) ? sess.date : '').slice(0,7);
  const [yN, moN] = sm.split('-').map(Number);
  const monthEnd = new Date(yN, moN, 0);
  if (!(meP.joinDate && new Date(meP.joinDate) <= monthEnd)) return { ok:false, reason:'notjoined' };
  if (!(sess && sess.allowDormant) && isDormantFor(meP, sm)) return { ok:false, reason:'dormant', month:sm };
  if (sess && sess.duesOnly) {
    const dd = await fetchDues(sm);
    if (!dd.some(d => d.member_id === memberId && d.paid)) return { ok:false, reason:'unpaid', month:sm };
  }
  return { ok:true };
}

  { key:'growth', label:'가장 성장한 선수', pick:'가장 성장한 선수를 골라주세요',  sub:'이번 달 가장 성장한 한 명을 선택하세요. (본인 제외)' },
];

async function fetchVotes(month, cat) {
  if (USE_DB) {
    const { data, error } = await sb.from('potm_votes').select('voter_id, candidate_id').eq('month', month).eq('category', cat);
    if (error) { return []; }
    return data;
  }
  try {
    return (JSON.parse(localStorage.getItem(POTM_STORE)) || []).filter(v => v.month === month && (v.category||'mvp') === cat);
  } catch (e) { return []; }
}

async function castVote(month, cat, voterId, candidateId) {
  if (USE_DB) {
    const { error } = await sb.from('potm_votes').insert({ month, category: cat, voter_id: voterId, candidate_id: candidateId });
    if (error) {
      if (error.code === '23505') return 'dup'; // unique 위반 = 이미 투표
      toast('투표 오류: ' + error.message); return false;
    }
    return true;
  }
  const all = JSON.parse(localStorage.getItem(POTM_STORE) || '[]');
  if (all.some(v => v.month === month && (v.category||'mvp') === cat && v.voter_id === voterId)) return 'dup';
  all.push({ month, category: cat, voter_id: voterId, candidate_id: candidateId });
  localStorage.setItem(POTM_STORE, JSON.stringify(all));
  return true;
}

async function resetVotes(month, cat) {
  if (USE_DB) {
    const { error } = await sb.from('potm_votes').delete().eq('month', month).eq('category', cat);
    if (error) { toast('초기화 오류: ' + error.message); return false; }
    return true;
  }
  const all = (JSON.parse(localStorage.getItem(POTM_STORE) || '[]')).filter(v => !(v.month === month && (v.category||'mvp') === cat));
  localStorage.setItem(POTM_STORE, JSON.stringify(all));
  return true;
}

const TEAM_BADGE = { 'WHITE': 'WHITE', 'BLACK': 'BLACK', '기타': '기타' };
function voterOptions(members) {

}
function byJersey(a, b) {
  return (a.jersey ?? 9999) - (b.jersey ?? 9999) || a.name.localeCompare(b.name, 'ko');
}
// 후보를 드롭다운(스크롤 선택)으로
function candSelect(candidates, cat) {

function pickCandSel(cat, val) {

function resultsHtml(votes, members, showVoters) {
  const tally = {};
  votes.forEach(v => { tally[v.candidate_id] = (tally[v.candidate_id] || 0) + 1; });
  const ranked = members.map(m => ({ ...m, c: tally[m.id] || 0 }))
    .filter(m => m.c > 0)
    .sort((a, b) => b.c - a.c || a.name.localeCompare(b.name, 'ko'));
  // 운영진 전용: 누가 누구에게 투표했는지
  const nameOf = id => { const m = members.find(x => x.id === id); return m ? m.name : ('#' + id); };
  const votersBlock = (showVoters && votes.length)
    ? `<div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.7">
         <b style="color:var(--coffee-2)">투표자 ${votes.length}명</b><br>${votes.map(v => esc(nameOf(v.voter_id))).join(', ')}</div>`
    : '';
  if (ranked.length === 0) return `<div class="res-locked"><div class="big"></div>아직 집계된 표가 없어요.</div>${votersBlock}`;
  const max = ranked[0].c;
  return `<div style="margin-top:16px">` + ranked.map((m, i) => `
    <div class="res-row">
      <div class="res-rank ${i === 0 ? 'top' : ''}">${i + 1}</div>
      <div class="res-main">
        <div class="res-name"><span>${m.jersey != null ? `<span style="color:var(--muted)">${m.jersey}</span> ` : ''}${esc(m.name)}</span><span class="cnt">${m.c}표</span></div>
        <div class="res-bar"><div style="width:${Math.round(m.c / max * 100)}%"></div></div>
      </div>
    </div>`).join('') + `</div>` + votersBlock;
}

function adminPanel(cat, month, votes, members) {

async function submitVote() {

  const pm = ROSTER.find(m => m.id === potmPick.mvp), pg = ROSTER.find(m => m.id === potmPick.growth);

const DUES_DEFAULT = {
  '박승한':10000,'홍순인':10000,'정희범':10000,'김이연':10000,'원재식':10000,'최승호':10000,'조은애':10000,

/* ---------- 공통: 다음 세션 날짜(다가오는 수요일) ---------- */
const ATTENDANCE_START = '2026-07-01';   // 출석 체크 시작일 (이전엔 첫 세션을 이 날로 고정)
function upcomingSessionDate() {
  const d = new Date(); d.setHours(0,0,0,0);
  let diff = (3 - d.getDay() + 7) % 7;               // 3 = 수요일
  if (diff === 0 && new Date().getHours() >= 23) diff = 7;
  d.setDate(d.getDate() + diff);
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  const ds = `${y}-${m}-${dd}`;
  return ds < ATTENDANCE_START ? ATTENDANCE_START : ds;   // 시작일 전이면 7/1 세션으로
}
function fmtClock(t){
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}`;   // 24시간제
}
// 시작 시간 + 2시간 → 종료 입력칸 자동 채움
function endPlus2(startId, endId){
  const v = document.getElementById(startId);
  const e = document.getElementById(endId);
  if(!v || !e || !v.value) return;
  const [h,m] = v.value.split(':').map(Number);
  const eh = (h + 2) % 24;
  e.value = `${String(eh).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function fmtSessionDate(ds, time, endTime) {
  if (!ds) return '';
  const dt = new Date(ds + 'T' + (time||'20:00'));
  const days=['일','월','화','수','목','금','토'];
  const start = fmtClock(time||'20:00');
  const end = endTime ? ' - ' + fmtClock(endTime) : '';
  return `${dt.getMonth()+1}월 ${dt.getDate()}일 (${days[dt.getDay()]}) ${start}${end}`;
}

const SETTINGS_STORE = 'socoffee_settings_v1';
let _settingsCache = null;
async function fetchSettings() {
  if (_settingsCache) return _settingsCache;
  let data = {};
  if (USE_DB) {
    const { data: row } = await sb.from('club_settings').select('data').eq('id','current').maybeSingle();
    data = (row && row.data) || {};
  } else {
    try { data = JSON.parse(localStorage.getItem(SETTINGS_STORE)) || {}; } catch(e) { data = {}; }
  }
  _settingsCache = data; return data;
}
async function saveSettings(patch) {
  // ⚠️ 저장 직전 DB 최신값을 다시 읽어 병합(오래된 캐시로 전체를 덮어써 유니폼 확정·사이즈 등이 리셋되던 버그 방지)
  let cur = {};
  if (USE_DB) {
    try { const { data: row } = await sb.from('club_settings').select('data').eq('id','current').maybeSingle(); cur = (row && row.data) || {}; }
    catch(e) { cur = _settingsCache || {}; }
  } else {
    try { cur = JSON.parse(localStorage.getItem(SETTINGS_STORE)) || {}; } catch(e) { cur = {}; }
  }
  const next = { ...cur, ...patch };
  _settingsCache = next;
  if (USE_DB) {
    const { error } = await sb.from('club_settings').upsert({ id:'current', data: next, updated_at: new Date().toISOString() });
    if (error) { toast('설정 저장 오류: ' + error.message); return false; }
  } else {
    localStorage.setItem(SETTINGS_STORE, JSON.stringify(next));
  }
  return true;
}
/* ---------- 세션(여러 개) — club_settings.sessions 배열에 저장 ---------- */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
async function getSessions() {
  const s = await fetchSettings();
  const list = Array.isArray(s.sessions) ? s.sessions.slice() : [];
  return list.sort((a,b)=> ((a.date||'')+(a.time||'')).localeCompare((b.date||'')+(b.time||'')));
}
// 다가오는(오늘 이후) 세션. 등록된 게 없으면 자동 세션 1개.
async function upcomingSessions() {
  const t = todayStr();
  let list = (await getSessions()).filter(s => (s.date||'') >= t);
  if (!list.length) {
    const d = upcomingSessionDate();
    list = [{ id:'auto-'+d, date:d, time:'21:00', place:'상암 풋살장', label:'', auto:true }];
  }
  return list;
}
// 세션이 끝났는지(종료시간 경과). 종료시간 없으면 시작+2시간, 그것도 없으면 그날 끝.
function sessionEnded(s){
  if(!s || !s.date) return false;
  let end = s.endTime;
  if(!end && s.time){ const [h,m]=s.time.split(':').map(Number); end = String((h+2)%24).padStart(2,'0')+':'+String(m||0).padStart(2,'0'); }
  if(!end) end = '23:59';
  return new Date(s.date+'T'+end) < new Date();
}
// 세션 장소 — 링크 있으면 클릭 시 이동
function sessPlaceHtml(s){
  const url = s && s.placeUrl;
  if (url && /^https?:\/\//i.test(url)) return `<a href="${esc(url)}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline">${esc(s.place)} ↗</a>`;
  return esc(s.place);
}
async function nearestSession() { return (await upcomingSessions())[0]; }

function sessChipLabel(s) {
  const [y,m,dd] = (s.date||'').split('-');
  const days=['일','월','화','수','목','금','토'];
  const wd = s.date ? days[new Date(s.date+'T00:00').getDay()] : '';
  const base = `${parseInt(m)}/${parseInt(dd)}(${wd})`;
  return s.label ? `${base} ${s.label}` : base;

        const a=(arr[i]||[]).find(x=>x.member_id===me); const st=a?a.status:'none'; if(st==='none') cnt++;

}

async function refreshNewBadges(){
  const me = getMe();
  let ridesNew = false, potmNew = false;
  try {
    const rides = await fetchRides();
    const newest = (rides[0] && rides[0].created_at) || '';
    const seen = localStorage.getItem('seen_rides') || '';
    ridesNew = !!newest && newest > seen;
  } catch(e){}
  try {
    if (me != null && isVotingOpen() && votingMembers(potmMonth()).some(m=>m.id===me)) {
      const mo = potmMonth();
      const [vm, vg] = await Promise.all([fetchVotes(mo,'mvp'), fetchVotes(mo,'growth')]);
      potmNew = !(vm.some(v=>v.voter_id===me) && vg.some(v=>v.voter_id===me));
    }
  } catch(e){}
  // 회비 미납 점: 표시달(dm) 활동 회원인데 아직 미납이면 표시
  // 홈 회비 행(dormStatus)과 동일하게 '그 달' 휴면만 본다(isDormantFor의 이번달 고정 규칙 제외) → 다음 달 활동 토글 반영
  const set = (id,on)=>{ const e=document.getElementById(id); if(e) e.style.display = on ? 'block' : 'none'; };
  set('dotList', ridesNew); set('dotPotm', potmNew); set('memberDot', ridesNew || potmNew);
}
function markRidesSeen(rides){
  const newest = (rides && rides[0] && rides[0].created_at) || new Date().toISOString();
  localStorage.setItem('seen_rides', newest);

}

async function homeQuickAtt(sid, status){

async function renderSquad() {
  const el = document.getElementById('squadContent');

  let tb = null;
  try { tb = await fetchTeamBuilder(); } catch(e) {}

  if (!players.length) { el.innerHTML = `<div class="section-title">팀 현황</div><div class="card"><div class="empty">명단을 불러오지 못했어요.</div></div>`; return; }
  const isDorm = p => (p.status === 'dormant') || (p.dormantMonths||[]).includes(month);
  const active = [], friends = [], dormant = [];
  players.forEach(p => { isDorm(p) ? dormant.push(p) : (p.status === 'friends' ? friends.push(p) : active.push(p)); });
  const sortJ = (a,b) => ((a.jersey==null?999:a.jersey) - (b.jersey==null?999:b.jersey)) || a.name.localeCompare(b.name,'ko');
  [active, friends, dormant].forEach(g => g.sort(sortJ));
  let skillsMap = {};

  };
  const grp = (title, arr, dim) => arr.length ? `<div class="sq-grp-h"><span>${title}</span><span>${arr.length}명</span></div><div class="sq-grid${dim?' dim':''}">${arr.map(chip).join('')}</div>` : '';
  el.innerHTML = `<div class="section-title">${potmMonthLabel(month)} 팀 현황</div>
    <div class="att-counts" style="margin:6px 0 8px">
      <div class="att-cnt"><div class="num">${active.length+dormant.length}</div><div class="cap">전체</div></div>
      <div class="att-cnt yes"><div class="num">${active.length}</div><div class="cap">활동</div></div>
      <div class="att-cnt none"><div class="num">${dormant.length}</div><div class="cap">휴면</div></div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin:0 2px 10px;display:flex;align-items:center;gap:5px">
      <span style="width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block"></span>스킬 입력
      <span style="width:8px;height:8px;border-radius:50%;border:1.5px solid var(--muted);box-sizing:border-box;display:inline-block;margin-left:8px"></span>미입력
    </div>
    ${grp('활동', active, false)}
    ${grp('이번 달 휴면', dormant, true)}`;
}

  if(!p) return;

function radarSvg(skills){
  const n=skills.length; if(n<3) return '';
  const cx=110,cy=110,R=82,rings=5; let g='';
  for(let k=1;k<=rings;k++){ const rr=R*k/rings; let pts=''; for(let i=0;i<n;i++){ const a=-Math.PI/2+i*2*Math.PI/n; pts+=(cx+rr*Math.cos(a)).toFixed(1)+','+(cy+rr*Math.sin(a)).toFixed(1)+' '; } g+=`<polygon points="${pts}" fill="none" stroke="#33492f" stroke-width="1"/>`; }
  for(let i=0;i<n;i++){ const a=-Math.PI/2+i*2*Math.PI/n; g+=`<line x1="${cx}" y1="${cy}" x2="${(cx+R*Math.cos(a)).toFixed(1)}" y2="${(cy+R*Math.sin(a)).toFixed(1)}" stroke="#33492f" stroke-width="1"/>`; }
  let dp=''; for(let i=0;i<n;i++){ const a=-Math.PI/2+i*2*Math.PI/n; const rr=R*(skills[i].level/5); dp+=(cx+rr*Math.cos(a)).toFixed(1)+','+(cy+rr*Math.sin(a)).toFixed(1)+' '; }
  g+=`<polygon points="${dp}" fill="rgba(221,214,182,.35)" stroke="#ddd6b6" stroke-width="2"/>`;
  for(let i=0;i<n;i++){ const a=-Math.PI/2+i*2*Math.PI/n; const lx=cx+(R+15)*Math.cos(a), ly=cy+(R+15)*Math.sin(a); const anc=Math.abs(Math.cos(a))<0.3?'middle':(Math.cos(a)>0?'start':'end'); g+=`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" fill="#ece6d2" font-size="11" font-weight="600" text-anchor="${anc}">${esc(skills[i].name)} ${skills[i].level}</text>`; }
  return `<svg viewBox="0 0 220 220" style="width:100%;max-width:230px;display:block;margin:6px auto 0;overflow:visible">${g}</svg>`;
}
// 내 카드 이미지 저장 (SCF 로고 + 등번호·이름·역할 + 스킬 레이더)
async function saveMyCard(){
  const me=getMe(); if(me==null) return;

  const jersey=(p.jersey!=null)?p.jersey:((meT.jersey!=null)?meT.jersey:'–');
  // 개인 스탯 (홈 카드와 동일 계산)
  let attCountAll=0, attRate=null, recent3=null;
  try{ const tb=await fetchTeamBuilder(); const tp=(tb&&tb.players||[]).find(z=>z.id===me); if(tp){ attCountAll=tp.attCountAll??tp.attCount??0; attRate=tp.attendanceAll??tp.attendance??null; recent3=recent3Rate(tp, tb.sessions);} }catch(e){}
  const winCount=(await getWinCounts())[me]||0;
  const joinFmt=p.joinDate?p.joinDate.slice(0,7).replace('-','.'):'—';
  const _mT=monthsSince(p.joinDate); const monthsLabel=_mT>0?_mT+'개월':'이번 달';
  const stats=[['가입월',joinFmt],['함께한 기간',monthsLabel],['참여 세션',attCountAll+'회'],['전체 출석률',attRate!=null?Math.round(attRate)+'%':'—'],['최근 3개월',recent3!=null?recent3+'%':'—'],['수상 횟수',winCount+'회']];
  const W=640,H=1050, c=document.createElement('canvas'); c.width=W; c.height=H; const x=c.getContext('2d');
  try{ await document.fonts.ready; }catch(e){}
  const loadImg = src => new Promise(r=>{ const im=new Image(); im.onload=()=>r(im); im.onerror=()=>r(null); im.src=src; });
  const [bgImg, logoImg] = await Promise.all([loadImg('scf_bg.png'), loadImg('img/scf_logo_preview.png')]);
  // 잔디 배경(cover) + 어두운 오버레이
  x.fillStyle='#15281b'; x.fillRect(0,0,W,H);
  if(bgImg){ const s=Math.max(W/bgImg.naturalWidth, H/bgImg.naturalHeight), dw=bgImg.naturalWidth*s, dh=bgImg.naturalHeight*s; x.drawImage(bgImg,(W-dw)/2,(H-dh)/2,dw,dh); x.fillStyle='rgba(18,32,22,0.82)'; x.fillRect(0,0,W,H); }
