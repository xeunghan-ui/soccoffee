<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>싸커피</title>
<meta name="description" content="싸커피 — 카페 풋살 리그">
<meta name="robots" content="noindex">
<!-- 홈 화면 추가 아이콘(SCF 로고) -->
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" href="scf-icon-180.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#15281b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="싸커피">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/member.css?v=20260722x">
</head>
<body>
<div class="gate" id="gate">
  <div class="gate-box">
    <img class="brand-logo" src="scf_logo.png" alt="싸커피 SCF" style="width:150px;margin-bottom:14px">
    <div class="field" style="text-align:left;margin-bottom:10px">
      <select id="gateName" onchange="gateNameChanged()"><option value="">— 이름 선택 —</option></select>
    </div>
    <input id="gatePin" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]*" placeholder="PIN 4자리" autocomplete="off"
           onkeydown="if(event.key==='Enter')gateLogin()">
    <div class="gate-err" id="gate-err"></div>
    <div class="hint" id="gateHint" style="font-size:11px;margin-top:6px"></div>
    <button class="btn" onclick="gateLogin()" style="margin-top:10px">로그인</button>
    <a href="./" style="display:inline-block;margin-top:16px;font-size:12px;color:#8a9a7e;text-decoration:none">← 싸커피 소개로</a>
  </div>
</div>

<div class="wrap">
  <div class="topbar">
    <span class="tb-mark">SOCCOFFEE</span>
    <button class="bell-btn" onclick="toggleBell()" aria-label="알림">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <span class="bell-dot" id="bellDot" style="display:none"></span>
    </button>
  </div>
  <div class="bell-panel hidden" id="bellPanel"></div>

  <div id="memberSubnav" class="member-subnav hidden">
    <button class="msub" data-sub="squad" onclick="switchTab('squad')">멤버 현황</button>
    <button class="msub" data-sub="list" onclick="switchTab('list')">카풀<span class="nav-dot" id="dotList" style="display:none"></span></button>
    <button class="msub" data-sub="potm" onclick="switchTab('potm')">투표<span class="nav-dot" id="dotPotm" style="display:none"></span></button>
    <button class="msub" data-sub="rank" onclick="switchTab('rank')">랭킹</button>
  </div>

  <div id="tab-home" class="hidden"><div id="homeContent"></div></div>
  <div id="tab-more" class="hidden"><div id="moreContent"></div></div>
  <div id="tab-mine" class="hidden"><div id="mineContent"></div></div>
  <div id="tab-faq" class="hidden"><div id="faqContent"></div></div>
  <div id="tab-squad" class="hidden"><div id="squadContent"></div></div>
  <div id="tab-att" class="hidden"><div id="attContent"></div></div>
  <div id="tab-dues" class="hidden"><div id="duesContent"></div></div>
  <div id="tab-ops" class="hidden"><div id="opsContent"></div></div>
  <div id="tab-rank" class="hidden"><div id="rankContent"></div></div>
  <div id="tab-draft" class="hidden"><div id="draftContent"></div></div>

  <div id="tab-list" class="hidden">
    <button class="btn" id="createToggle" onclick="toggleCreate()" style="margin-bottom:14px">+ 카풀 등록하기</button>
    <div id="createPanel" class="hidden">
      <div class="card">
        <h2>차주 카풀 등록</h2>
        <p class="sub">출발 정보와 태울 수 있는 인원을 입력해 주세요.</p>
        <div class="field">
          <label>이름 / 닉네임</label>
          <input id="f-driver" placeholder="예: 승한" maxlength="20">
        </div>
        <div class="field">
          <label>출발 장소</label>
          <input id="f-place" placeholder="예: 강남역 2번 출구" maxlength="40">
        </div>
        <div class="row">
          <div class="field">
            <label>출발 날짜</label>
            <input id="f-date" type="date">
          </div>
          <div class="field">
            <label>출발 시간</label>
            <input id="f-time" type="time">
          </div>
        </div>
        <div class="field">
          <label>가능 인원 (탑승 가능 좌석)</label>
          <select id="f-seats">
            <option value="1">1명</option><option value="2">2명</option>
            <option value="3" selected>3명</option><option value="4">4명</option>
            <option value="5">5명</option><option value="6">6명</option>
          </select>
        </div>
        <div class="field">
          <label>도착지</label>
          <select id="f-dest-sel" onchange="onDestChange()">
            <option value="상암 풋살장" selected>상암 풋살장</option>
            <option value="__custom__">직접 입력</option>
          </select>
          <input id="f-dest" class="hidden" placeholder="도착지를 입력하세요" maxlength="50" style="margin-top:8px">
        </div>
        <button class="btn" id="createBtn" onclick="createRide()">카풀 등록하기</button>
        <button class="btn ghost" onclick="toggleCreate(true)" style="margin-top:8px">닫기</button>
      </div>
    </div>

    <div class="section-title">모집 중인 카풀 <button class="refresh" onclick="render()">새로고침</button></div>
    <div id="rideList"></div>

    <div id="pastSection" class="hidden">
      <button class="past-toggle" onclick="togglePast()">
        <span>지난 카풀 <span id="pastCount"></span></span>
        <span class="chev" id="pastChev">▾</span>
      </button>
      <div id="pastList" class="past-list"></div>
    </div>
  </div>

  <div id="tab-potm" class="hidden">
    <div id="potmContent"></div>
  </div>

  <div class="admin-bar">
    <span class="me-label" id="meLabel"></span>
    <button class="admin-link" onclick="logout()">로그아웃</button>
  </div>
</div>

<nav class="bottomnav" id="bottomNav">
  <button class="bnav-item active" data-tab="home" onclick="switchTab('home')"><span class="bn-ico">⌂</span>홈</button>
  <button class="bnav-item" data-tab="att" onclick="switchTab('att')"><span class="bn-ico">◷</span>일정<span class="bn-badge" id="attBadge" style="display:none"></span></button>
  <button class="bnav-item" data-tab="member" onclick="switchTab('squad')"><span class="bn-ico">▦</span>멤버<span class="nav-dot" id="memberDot" style="display:none"></span></button>
  <button class="bnav-item" data-tab="more" onclick="switchTab('more')"><span class="bn-ico">≡</span>더보기</button>
</nav>

<div class="toast" id="toast"></div>

<script src="js/member.js?v=20260722y"></script>
</body>
</html>
